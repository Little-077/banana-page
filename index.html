<!DOCTYPE html>
<html lang="zh">
<head>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍌</text></svg>">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生图工坊 · 多用户版</title>
    <!-- 引入 idb-keyval 库，用于 IndexedDB 存储 -->
    <script src="https://cdn.jsdelivr.net/npm/idb-keyval@6/dist/umd.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; background: #0b0f15; color: #e3e7f0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .app { display: flex; flex: 1; overflow: hidden; background: #1e2632; }
        .sidebar { width: 340px; background: #131a24; display: flex; flex-direction: column; padding: 1.5rem 1rem; overflow-y: auto; border-right: 1px solid #2c3848; gap: 1.5rem; }
        .sidebar h2 { font-size: 1.4rem; font-weight: 500; display: flex; align-items: center; gap: 0.4rem; border-bottom: 1px solid #2f3e52; padding-bottom: 0.7rem; color: #b7e0ff; }
        .control-group { background: #0e141c; border-radius: 16px; padding: 1.2rem 1rem; border: 1px solid #253241; }
        .control-group label { font-size: 0.85rem; text-transform: uppercase; font-weight: 600; color: #9ab3d1; display: block; margin-bottom: 0.5rem; }
        input, textarea, select { width: 100%; background: #1b2531; border: 1px solid #31435a; border-radius: 12px; padding: 0.7rem 1rem; color: white; font-size: 0.95rem; outline: none; }
        input:focus, textarea:focus, select:focus { border-color: #5f8ec9; background: #1f2b3a; }
        textarea { min-height: 80px; resize: vertical; }
        .api-key-row { display: flex; gap: 8px; }
        .file-upload-area { display: flex; flex-direction: column; gap: 12px; }
        .file-preview { display: flex; flex-wrap: wrap; gap: 8px; padding: 10px; background: #10171f; border-radius: 16px; border: 1px dashed #415977; min-height: 80px; }
        .thumb-container { position: relative; display: inline-block; width: 60px; height: 60px; }
        .thumb-container .thumb { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; border: 2px solid #2d5f9e; background: #1f2c3a; }
        .thumb-container .thumb-index { position: absolute; bottom: -2px; right: -2px; background: #2d5f9e; color: white; font-size: 12px; font-weight: bold; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid #10171f; z-index: 1; }
        .thumb-remove { position: absolute; top: -6px; right: -6px; width: 20px; height: 20px; background: #ff4d4f; color: white; border-radius: 50%; font-size: 16px; font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid #10171f; line-height: 1; transition: background 0.2s; z-index: 2; }
        .thumb-remove:hover { background: #ff7875; }
        .placeholder { width: 60px; height: 60px; border-radius: 8px; background: #1f2c3a; display: flex; align-items: center; justify-content: center; color: #4f6180; font-size: 24px; }
        .button-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px; }
        button { background: #2b3d54; border: none; border-radius: 30px; padding: 0.7rem 1.4rem; font-weight: 600; color: white; cursor: pointer; border: 1px solid #406080; flex: 1 1 auto; font-size: 0.9rem; }
        button.primary { background: #2d5f9e; border-color: #6298da; }
        button.primary:hover { background: #3b70b5; }
        button:hover { background: #324b68; }
        .radio-row { display: flex; gap: 18px; align-items: center; flex-wrap: wrap; }
        .radio-item { display: flex; align-items: center; gap: 5px; }
        .radio-item input[type="radio"] { width: auto; accent-color: #4f8ed8; }
        .model-select-row { display: flex; gap: 8px; }
        .model-select-row select { flex: 2; }
        .model-select-row input { flex: 3; }
        .hint { font-size: 0.75rem; color: #6e85a8; margin-top: 5px; }
        .gallery { flex: 1; background: #0e141c; display: flex; flex-direction: row; gap: 16px; padding: 1.5rem; overflow: hidden; }
        .gallery-left { flex: 1; min-width: 0; display: flex; flex-direction: column; }
        .gallery-left h3 { font-size: 1.2rem; font-weight: 400; margin-bottom: 1rem; color: #bdd3f0; display: flex; align-items: center; gap: 8px; }
        .image-grid { flex: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.2rem; align-content: start; }
        .image-card { background: #101821; border-radius: 18px; overflow: hidden; border: 1px solid #2d3f53; cursor: pointer; transition: 0.1s; padding-bottom: 8px; }
        .image-card:hover { border-color: #678fc0; transform: scale(1.01); }
        .image-card img { width: 100%; height: auto; display: block; background: #1f2d3b; object-fit: contain; }
        .image-card .meta { padding: 0.5rem; font-size: 0.7rem; color: #95adcc; background: #0c131d; border-top: 1px solid #253545; cursor: pointer; user-select: text; }
        .image-card .meta:hover { background: #1a2533; }
        .image-card {position: relative; /* 让删除按钮可以绝对定位 */}
        .image-card .delete-btn {position: absolute;
    top: 8px;
    right: 8px;
    width: 24px;
    height: 24px;
    background: rgba(0,0,0,0.6);
    color: white;
    border-radius: 50%;
    font-size: 18px;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.3);
    transition: background 0.2s;
    z-index: 5;
}
.image-card .delete-btn:hover {
    background: #ff4d4f;
    border-color: #ff4d4f;
}
        .download-btn { background: #2d5f9e; border: none; border-radius: 20px; padding: 6px 12px; color: white; font-size: 0.8rem; cursor: pointer; margin: 8px auto; display: block; width: fit-content; transition: 0.2s; }
        .download-btn:hover { background: #3b70b5; }
        .empty-gallery { grid-column: 1 / -1; text-align: center; color: #546e8a; font-size: 1.1rem; padding: 4rem 0; border: 2px dashed #25384d; border-radius: 40px; }
        .loading-overlay { display: inline-block; margin-left: 10px; color: #7aa9ff; }
        .error-msg { background: #4f2a2a; border-radius: 30px; padding: 0.5rem 1rem; color: #ffc1a0; font-size: 0.9rem; margin-top: 8px; border: 1px solid #b55a5a; }
        .lightbox { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); overflow: auto; }
        .lightbox-content { margin: auto; display: block; max-width: 90%; max-height: 80%; position: relative; top: 50%; transform: translateY(-50%); }
        .close-lightbox { position: absolute; top: 20px; right: 35px; color: #f1f1f1; font-size: 40px; font-weight: bold; cursor: pointer; }
        .close-lightbox:hover { color: #bbb; }
        .lightbox-caption { margin: 20px auto; text-align: center; color: #ccc; max-width: 80%; }

        /* 右侧用户标签页样式 */
        .user-tabs-sidebar {
            width: 160px;
            background: #131a24;
            border-left: 1px solid #2c3848;
            padding: 1rem 0.5rem;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
            border-radius: 8px;
        }
        .tabs-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 4px 8px 4px;
            border-bottom: 1px solid #2c3848;
            color: #9ab3d1;
            font-size: 0.9rem;
        }
        .tab-container-vertical {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .tab-item-vertical {
            background: #1e2a3a;
            border: 1px solid #3a4c66;
            border-radius: 6px;
            padding: 8px 10px;
            font-size: 0.9rem;
            color: #b0c7e0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: 0.2s;
        }
        .tab-item-vertical.active {
            background: #2d4055;
            border-color: #5f8ec9;
            color: white;
            font-weight: 500;
        }
        .tab-item-vertical .tab-name {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-right: 6px;
        }
        .tab-item-vertical .tab-close {
            font-size: 1.2rem;
            line-height: 1;
            opacity: 0.6;
            padding: 0 2px;
        }
        .tab-item-vertical .tab-close:hover {
            opacity: 1;
            color: #ff7875;
        }
        .tab-item-vertical input {
            background: #1b2531;
            border: 1px solid #5f8ec9;
            color: white;
            font-size: 0.9rem;
            padding: 4px 6px;
            border-radius: 4px;
            width: 100%;
        }
        .add-tab-btn {
            background: #1e2a3a;
            border: 1px solid #3a4c66;
            border-radius: 8px;
            width: 32px;
            height: 32px;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #b0c7e0;
            transition: 0.2s;
        }
        .add-tab-btn:hover {
            background: #2d4055;
            color: white;
        }
        footer { font-size: 0.7rem; color: #3b5170; text-align: center; margin-top: 1rem; }
    </style>
</head>
<body>
<div class="app">
    <!-- 左侧配置面板 -->
    <div class="sidebar">
        <h2><span>🍌</span> 生图工坊 · 多用户</h2>
        <div class="control-group">
            <label>🔐 API Key</label>
            <div class="input-row api-key-row">
                <input type="password" id="apiKey" placeholder="输入您的 API Key" value="">
            </div>
            <div class="input-row">
                <input type="text" id="apiBase" placeholder="API Base URL" value="https://ai.t8star.cn">
                <div class="hint">默认使用 ai.t8star.cn</div>
            </div>
        </div>

        <div class="control-group">
            <label>📝 提示词</label>
            <textarea id="prompt" placeholder="A beautiful neon cyberpunk cat, 8k, detailed ...">a serene landscape with floating islands, ethereal lighting</textarea>
            <div class="input-row" style="margin-top: 10px;">
                <label style="margin-bottom: 3px;">👎 负面提示 (可选)</label>
                <input type="text" id="negativePrompt" placeholder="blurry, ugly, low quality" value="blurry, ugly, low quality">
            </div>
            <button class="primary" id="generateBtn" style="width:100%; margin-top: 15px; padding: 0.9rem;">✨ 生成图片</button>
            <div id="loadingIndicator" style="display: none; text-align:center; margin-top: 8px;">⏳ 生成中...</div>
            <div id="errorMessage" class="error-msg" style="display: none;"></div>
        </div>

        <div class="control-group">
            <label>🖼️ 参考图 (可多选)</label>
            <div class="file-upload-area">
                <input type="file" id="refImage" accept="image/*" multiple>
                <div class="file-preview" id="refPreview">
                    <div class="placeholder">📷</div>
                </div>
                <div style="font-size:0.8rem; color:#9ab3d1;">点击右上角 ✕ 可移除图片，序号自动更新</div>
            </div>
        </div>

        <div class="control-group">
            <label>🧠 模型名称</label>
            <div class="model-select-row">
                <select id="modelPreset">
                    <option value="gemini-3.1-flash-image-preview">香蕉2- 0.2/一张</option>
                    <option value="gemini-2.5-flash-image">香蕉- 0.04/张</option>
                    <option value="custom">✏️ 自定义...</option>
                </select>
                <input type="text" id="modelKey" placeholder="输入模型名" value="gemini-3.1-flash-image-preview">
            </div>
        </div>

        <div class="control-group">
            <div style="display: flex; justify-content: space-between;">
                <label>📐 比例</label>
                <label>🔍 尺寸档次</label>
            </div>
            <div style="display: flex; gap: 15px; align-items: center; flex-wrap: wrap;">
                <div class="radio-row" id="aspectGroup">
                    <div class="radio-item"><input type="radio" name="aspect" id="ratio9x16" value="9:16"> <label for="ratio9x16">9:16</label></div>
                    <div class="radio-item"><input type="radio" name="aspect" id="ratio16x9" value="16:9" checked> <label for="ratio16x9">16:9</label></div>
                    <div class="radio-item"><input type="radio" name="aspect" id="ratio1x1" value="1:1"> <label for="ratio1x1">1:1</label></div>
                </div>
                <div class="radio-row" id="sizeGroup">
                    <div class="radio-item"><input type="radio" name="size" value="1k" checked> 1K</div>
                    <div class="radio-item"><input type="radio" name="size" value="2k"> 2K</div>
                    <div class="radio-item"><input type="radio" name="size" value="4k"> 4K</div>
                </div>
            </div>
            <div style="margin-top: 16px;">
                <label>🔢 一次生成张数</label>
                <select id="batchCount">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                </select>
                <div id="sizeHint" style="font-size:0.8rem; color:#7cfc00; margin-top:5px;">✅ 当前模型支持 1K/2K/4K</div>
            </div>
        </div>
        <footer>⚡ 图片存储在 IndexedDB，换电脑需导入导出</footer>
    </div>

    <!-- 右侧画廊 + 纵向用户标签页 -->
    <div class="gallery">
        <!-- 左侧图片区域 -->
        <div class="gallery-left">
            <h3>🖼️ 生成作品集 <span id="imageCount"></span></h3>
            <div class="image-grid" id="galleryGrid">
                <div class="empty-gallery">✨ 生成的图片会出现在这里</div>
            </div>
        </div>

        <!-- 右侧用户标签页 -->
        <div class="user-tabs-sidebar" id="userTabsSidebar">
            <div class="tabs-header">
                <span>👥 用户列表</span>
                <button class="add-tab-btn" id="addTabBtn" title="新建用户">➕</button>
            </div>
            <div class="tab-container-vertical" id="tabContainerVertical"></div>
        </div>
    </div>
</div>

<!-- 图片放大模态框 -->
<div id="lightbox-modal" class="lightbox" style="display: none;" onclick="closeLightbox()">
    <span class="close-lightbox">&times;</span>
    <img class="lightbox-content" id="lightbox-img">
    <div class="lightbox-caption" id="lightbox-caption"></div>
</div>

<script>
(function() {
    // ========== 全局变量 ==========
    var userTabs = [];
    var currentUserId = null;
    var galleryImages = [];

    // DOM 元素
    const apiKeyInput = document.getElementById('apiKey');
    const apiBaseInput = document.getElementById('apiBase');
    const promptInput = document.getElementById('prompt');
    const negativePromptInput = document.getElementById('negativePrompt');
    const generateBtn = document.getElementById('generateBtn');
    const loadingSpan = document.getElementById('loadingIndicator');
    const errorDiv = document.getElementById('errorMessage');
    const refImageInput = document.getElementById('refImage');
    const refPreviewDiv = document.getElementById('refPreview');
    const modelPreset = document.getElementById('modelPreset');
    const modelKeyInput = document.getElementById('modelKey');
    const batchCountSelect = document.getElementById('batchCount');
    const galleryGrid = document.getElementById('galleryGrid');
    const imageCountSpan = document.getElementById('imageCount');
    const sizeHint = document.getElementById('sizeHint');

    // ========== 辅助函数 ==========
    function getImageSize(aspect, size) {
        const longSide = size === '1k' ? 1024 : (size === '2k' ? 2048 : 4096);
        let width, height;
        if (aspect === '9:16') {
            height = longSide;
            width = Math.round(longSide * 9 / 16);
        } else if (aspect === '16:9') {
            width = longSide;
            height = Math.round(longSide * 9 / 16);
        } else { // 1:1
            width = height = longSide;
        }
        return `${width}x${height}`;
    }

    function showError(msg) {
        errorDiv.style.display = 'block';
        errorDiv.textContent = '❌ ' + msg;
    }
    function hideError() {
        errorDiv.style.display = 'none';
    }
    function updateImageCount() {
        const count = galleryGrid.querySelectorAll('.image-card').length;
        imageCountSpan.textContent = count ? `(${count}张)` : '';
    }

    // ========== 创建图片卡片 ==========
    function createImageCard(imgSrc, promptText) {
    const card = document.createElement('div');
    card.className = 'image-card';

    const img = document.createElement('img');
    img.src = imgSrc;
    img.alt = 'generated';
    img.loading = 'lazy';

    const meta = document.createElement('div');
    meta.className = 'meta';
    meta.textContent = promptText.slice(0, 35) + (promptText.length > 35 ? '…' : '');
    meta.title = promptText; // 完整提示词作为 tooltip
    meta.addEventListener('click', async function() {
        try {
            await navigator.clipboard.writeText(promptText);
            const original = this.textContent;
            this.textContent = '✅ 已复制';
            setTimeout(() => this.textContent = original, 1000);
        } catch (err) {
            const range = document.createRange();
            range.selectNodeContents(this);
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
        }
    });

    // 下载按钮
    const downloadBtn = document.createElement('button');
    downloadBtn.textContent = '⬇️ 下载';
    downloadBtn.className = 'download-btn';
    downloadBtn.onclick = function(e) {
        e.stopPropagation();
        downloadImage(imgSrc, promptText.slice(0, 20) || 'image');
    };

    // 删除按钮
    const deleteBtn = document.createElement('div');
    deleteBtn.className = 'delete-btn';
    deleteBtn.innerHTML = '&times;'; // 乘号 ✕
    deleteBtn.onclick = function(e) {
        e.stopPropagation();
        // 弹出确认对话框
        if (confirm('确定要删除这张图片吗？')) {
            deleteImageFromGallery(imgSrc);
        }
    };

    img.onclick = function() {
        openLightbox(imgSrc, meta.textContent);
    };

    card.appendChild(img);
    card.appendChild(meta);
    card.appendChild(downloadBtn);
    card.appendChild(deleteBtn); // 加入删除按钮
    return card;
}

    // ========== 模态框相关 ==========
    function openLightbox(imgSrc, caption) {
        document.getElementById('lightbox-img').src = imgSrc;
        document.getElementById('lightbox-caption').textContent = caption || '';
        document.getElementById('lightbox-modal').style.display = 'block';
    }
    function closeLightbox() {
        document.getElementById('lightbox-modal').style.display = 'none';
    }
    window.closeLightbox = closeLightbox;
    document.getElementById('lightbox-modal').addEventListener('click', function(e) {
        if (e.target === this) closeLightbox();
    });

    function downloadImage(imgSrc, filename = 'image') {
        const link = document.createElement('a');
        link.href = imgSrc;
        link.download = filename + '.png';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // ========== 参考图多选及移除 ==========
    refImageInput.addEventListener('change', (e) => {
        const files = Array.from(e.target.files);
        refPreviewDiv.innerHTML = '';

        if (files.length === 0) {
            const placeholder = document.createElement('div');
            placeholder.className = 'placeholder';
            placeholder.textContent = '📷';
            refPreviewDiv.appendChild(placeholder);
            refImageInput._base64Array = [];
            return;
        }

        const base64Promises = files.map((file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    resolve({
                        base64: ev.target.result.split(',')[1],
                        dataUrl: ev.target.result,
                        name: file.name
                    });
                };
                reader.readAsDataURL(file);
            });
        });

        Promise.all(base64Promises).then(results => {
            refImageInput._base64Array = results.map(r => r.base64);
            results.forEach((result, index) => {
                const container = document.createElement('div');
                container.className = 'thumb-container';
                container.dataset.base64 = result.base64;

                const img = document.createElement('img');
                img.src = result.dataUrl;
                img.className = 'thumb';

                const indexSpan = document.createElement('span');
                indexSpan.className = 'thumb-index';
                indexSpan.textContent = index + 1;

                const removeBtn = document.createElement('span');
                removeBtn.className = 'thumb-remove';
                removeBtn.innerHTML = '&times;';
                removeBtn.onclick = function(e) {
                    e.stopPropagation();
                    const cont = this.closest('.thumb-container');
                    const base64ToRemove = cont.dataset.base64;
                    cont.remove();

                    const idx = refImageInput._base64Array.findIndex(b => b === base64ToRemove);
                    if (idx !== -1) refImageInput._base64Array.splice(idx, 1);

                    const remaining = refPreviewDiv.querySelectorAll('.thumb-container');
                    remaining.forEach((c, i) => {
                        c.querySelector('.thumb-index').textContent = i + 1;
                    });

                    if (remaining.length === 0) {
                        const placeholder = document.createElement('div');
                        placeholder.className = 'placeholder';
                        placeholder.textContent = '📷';
                        refPreviewDiv.appendChild(placeholder);
                        refImageInput._base64Array = [];
                    }
                };

                container.appendChild(img);
                container.appendChild(indexSpan);
                container.appendChild(removeBtn);
                refPreviewDiv.appendChild(container);
            });
        });
    });

    // ========== 模型预设联动 ==========
    modelPreset.addEventListener('change', (e) => {
        const selected = e.target.value;
        if (selected !== 'custom') {
            modelKeyInput.value = selected;
        } else {
            modelKeyInput.value = '';
            modelKeyInput.focus();
        }

        // 更新尺寸提示
        if (selected.includes('2.5-flash')) {
            sizeHint.textContent = '⚠️ gemini-2.5-flash-image 固定 1024px，尺寸选择无效';
            sizeHint.style.color = '#ffaa00';
            document.querySelectorAll('input[name="size"]').forEach(r => r.disabled = true);
        } else {
            sizeHint.textContent = '✅ 当前模型支持 1K/2K/4K 分辨率';
            sizeHint.style.color = '#7cfc00';
            document.querySelectorAll('input[name="size"]').forEach(r => r.disabled = false);
        }
    });

    // ========== Gemini 调用 ==========
    async function callGeminiGeneration(apiKey, baseURL, model, prompt, negativePrompt, imageSize, initImagesBase64 = [], aspect = '16:9') {
        const parts = [];
        let finalPrompt = prompt;
        if (negativePrompt && negativePrompt.trim() !== '') {
            finalPrompt = `Positive: ${prompt}\nNegative: ${negativePrompt}`;
        }

        const isNewModel = model.includes('2.5-flash');
        if (isNewModel) {
            // 新模型：图片在前
            if (initImagesBase64 && initImagesBase64.length > 0) {
                initImagesBase64.forEach(base64 => {
                    parts.push({ inlineData: { mimeType: "image/png", data: base64 } });
                });
            }
            parts.push({ text: finalPrompt });
        } else {
            // 旧模型：文本在前
            parts.push({ text: finalPrompt });
            if (initImagesBase64 && initImagesBase64.length > 0) {
                initImagesBase64.forEach(base64 => {
                    parts.push({ inlineData: { mimeType: "image/png", data: base64 } });
                });
            }
        }

        const requestBody = {
            contents: [{ role: "user", parts: parts }],
            generationConfig: {}
        };

        if (isNewModel) {
            requestBody.generationConfig.imageConfig = { aspectRatio: aspect };
            requestBody.generationConfig.responseModalities = ["IMAGE"];
        } else {
            requestBody.generationConfig.temperature = 1;
            requestBody.generationConfig.topK = 32;
            requestBody.generationConfig.topP = 1;
            requestBody.generationConfig.maxOutputTokens = 2048;
            requestBody.generationConfig.responseModalities = ["image"];
            requestBody.generationConfig.imageSize = imageSize;
        }

        const endpoint = baseURL.replace(/\/$/, '') + `/v1beta/models/${model}:generateContent`;
        const headers = {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${apiKey}`
        };

        const response = await fetch(endpoint, {
            method: 'POST',
            headers: headers,
            body: JSON.stringify(requestBody)
        });

        if (!response.ok) {
            const errorText = await response.text();
            throw new Error(`HTTP ${response.status}: ${errorText}`);
        }

        const data = await response.json();
        if (!data.candidates || data.candidates.length === 0) throw new Error('未返回任何图片');
        const partsResp = data.candidates[0].content.parts;
        for (const part of partsResp) {
            if (part.inlineData && part.inlineData.data) return part.inlineData.data;
        }
        throw new Error('响应中未找到图片数据');
    }

    // ========== 生成图片主函数 ==========
    async function onGenerate() {
        const apiKey = apiKeyInput.value.trim();
        const baseURL = apiBaseInput.value.trim() || 'https://ai.t8star.cn';
        const model = modelKeyInput.value.trim();
        const prompt = promptInput.value.trim();
        const negativePrompt = negativePromptInput.value.trim();
        const aspect = document.querySelector('input[name="aspect"]:checked')?.value || '16:9';
        const size = document.querySelector('input[name="size"]:checked')?.value || '1k';
        const batchCount = parseInt(batchCountSelect.value, 10);
        const refBase64Array = refImageInput._base64Array || [];

        if (!apiKey) { showError('请输入 API Key'); return; }
        if (!model) { showError('请输入模型名称'); return; }
        if (!prompt) { showError('提示词不能为空'); return; }

        const imageSize = getImageSize(aspect, size);
        hideError();
        loadingSpan.style.display = 'inline-block';
        generateBtn.disabled = true;

        try {
            const requests = [];
            for (let i = 0; i < batchCount; i++) {
                requests.push(callGeminiGeneration(apiKey, baseURL, model, prompt, negativePrompt, imageSize, refBase64Array, aspect));
            }
            const results = await Promise.all(requests);
            await addImagesToGallery(results, prompt);
        } catch (err) {
            showError(err.message || '生成失败');
            console.error(err);
        } finally {
            loadingSpan.style.display = 'none';
            generateBtn.disabled = false;
        }
    }

    // ========== 添加图片到画廊并存入 IndexedDB ==========
    async function addImagesToGallery(imageBase64List, promptUsed) {
        if (!imageBase64List || imageBase64List.length === 0) return;

        // 移除空占位符
        if (galleryGrid.children.length === 1 && galleryGrid.children[0].classList.contains('empty-gallery')) {
            galleryGrid.innerHTML = '';
        }

        imageBase64List.forEach(src => {
            const fullSrc = src.startsWith('data:') ? src : 'data:image/png;base64,' + src;
            const card = createImageCard(fullSrc, promptUsed);
            galleryGrid.insertBefore(card, galleryGrid.firstChild);
            galleryImages.unshift({ src: fullSrc, prompt: promptUsed });
        });

        // 可选：限制总张数避免过大（例如最多50张）
        if (galleryImages.length > 50) {
            galleryImages = galleryImages.slice(0, 50);
            // 重新渲染
            galleryGrid.innerHTML = '';
            galleryImages.forEach(item => {
                const card = createImageCard(item.src, item.prompt);
                galleryGrid.appendChild(card);
            });
        }

        // 保存到 IndexedDB
        try {
            await idbKeyval.set('galleryImages_' + currentUserId, galleryImages);
            console.log('已保存', galleryImages.length, '张图片到 IndexedDB');
        } catch (e) {
            console.error('IndexedDB 保存失败', e);
        }
        updateImageCount();
    }
// 删除指定图片
async function deleteImageFromGallery(imgSrc) {
    // 从 galleryImages 数组中移除该项
    const index = galleryImages.findIndex(item => item.src === imgSrc);
    if (index === -1) return;

    galleryImages.splice(index, 1);

    // 重新渲染画廊
    galleryGrid.innerHTML = '';
    if (galleryImages.length === 0) {
        galleryGrid.innerHTML = '<div class="empty-gallery">✨ 该用户暂无图片</div>';
    } else {
        galleryImages.forEach(item => {
            const card = createImageCard(item.src, item.prompt);
            galleryGrid.appendChild(card);
        });
    }

    // 更新 IndexedDB
    try {
        await idbKeyval.set('galleryImages_' + currentUserId, galleryImages);
        console.log('已删除图片，更新 IndexedDB');
    } catch (e) {
        console.error('IndexedDB 更新失败', e);
    }

    updateImageCount();
}
    // ========== 用户标签页相关函数 ==========
    async function loadUserTabs() {
        try {
            const tabsSaved = await idbKeyval.get('userTabs');
            if (tabsSaved) {
                userTabs = tabsSaved;
            } else {
                userTabs = [
                    { id: 'user1', name: '用户 A' },
                    { id: 'user2', name: '用户 B' }
                ];
                // 尝试迁移旧 localStorage 数据
                const oldData = localStorage.getItem('generatedImages');
                if (oldData) {
                    await idbKeyval.set('galleryImages_user1', JSON.parse(oldData));
                    localStorage.removeItem('generatedImages');
                    console.log('已迁移旧数据到用户 A');
                }
            }

            const lastUserId = await idbKeyval.get('currentUserId');
            if (lastUserId && userTabs.some(t => t.id === lastUserId)) {
                currentUserId = lastUserId;
            } else {
                currentUserId = userTabs[0].id;
            }

            renderTabs();
            await loadGalleryForUser(currentUserId);
        } catch (e) {
            console.warn('加载用户数据失败', e);
        }
    }

    async function saveUserTabs() {
        try {
            await idbKeyval.set('userTabs', userTabs);
            await idbKeyval.set('currentUserId', currentUserId);
        } catch (e) {
            console.warn('保存用户数据失败', e);
        }
    }

    async function loadGalleryForUser(userId) {
        try {
            const saved = await idbKeyval.get('galleryImages_' + userId);
            galleryImages = saved || [];
        } catch (e) {
            galleryImages = [];
        }
        galleryGrid.innerHTML = '';
        if (galleryImages.length === 0) {
            galleryGrid.innerHTML = '<div class="empty-gallery">✨ 该用户暂无图片</div>';
        } else {
            galleryImages.forEach(item => {
                const card = createImageCard(item.src, item.prompt);
                galleryGrid.appendChild(card);
            });
        }
        updateImageCount();
        console.log('已加载用户', userId, '的图片', galleryImages.length);
    }

    function renderTabs() {
        const container = document.getElementById('tabContainerVertical');
        if (!container) return;
        container.innerHTML = '';
        userTabs.forEach(tab => {
            const tabDiv = document.createElement('div');
            tabDiv.className = 'tab-item-vertical' + (tab.id === currentUserId ? ' active' : '');
            tabDiv.dataset.id = tab.id;

            const nameSpan = document.createElement('span');
            nameSpan.textContent = tab.name;
            nameSpan.className = 'tab-name';
            nameSpan.ondblclick = function(e) {
                e.stopPropagation();
                enterEditModeVertical(tabDiv, tab);
            };

            tabDiv.appendChild(nameSpan);

            if (userTabs.length > 1) {
                const closeSpan = document.createElement('span');
                closeSpan.className = 'tab-close';
                closeSpan.innerHTML = '&times;';
                closeSpan.onclick = function(e) {
                    e.stopPropagation();
                    deleteUser(tab.id);
                };
                tabDiv.appendChild(closeSpan);
            }

            tabDiv.onclick = function(e) {
                if (e.target.classList.contains('tab-close')) return;
                switchUser(tab.id);
            };

            container.appendChild(tabDiv);
        });
    }

    function enterEditModeVertical(tabDiv, tab) {
        const nameSpan = tabDiv.querySelector('.tab-name');
        const input = document.createElement('input');
        input.type = 'text';
        input.value = tab.name;
        input.onblur = function() {
            const newName = this.value.trim() || '未命名';
            tab.name = newName;
            saveUserTabs();
            renderTabs();
        };
        input.onkeydown = function(e) {
            if (e.key === 'Enter') this.blur();
        };
        nameSpan.replaceWith(input);
        input.focus();
        input.select();
    }

    async function deleteUser(userId) {
        const index = userTabs.findIndex(t => t.id === userId);
        if (index === -1) return;
        userTabs.splice(index, 1);
        if (userId === currentUserId) {
            currentUserId = userTabs[0].id;
        }
        try {
            await idbKeyval.del('galleryImages_' + userId);
        } catch (e) {
            console.warn('删除用户图片失败', e);
        }
        await saveUserTabs();
        renderTabs();
        await loadGalleryForUser(currentUserId);
    }

    async function addNewUser() {
        const newId = 'user' + Date.now();
        const newName = '用户 ' + (userTabs.length + 1);
        userTabs.push({ id: newId, name: newName });
        await saveUserTabs();
        currentUserId = newId;
        renderTabs();
        await loadGalleryForUser(currentUserId);
    }

    async function switchUser(userId) {
        if (userId === currentUserId) return;
        currentUserId = userId;
        await saveUserTabs();
        renderTabs();
        await loadGalleryForUser(currentUserId);
    }

    // ========== 页面初始化 ==========
    document.addEventListener('DOMContentLoaded', async function() {
        await loadUserTabs();
        const addBtn = document.getElementById('addTabBtn');
        if (addBtn) addBtn.addEventListener('click', addNewUser);
        if (generateBtn && !generateBtn._hasListener) {
            generateBtn.addEventListener('click', onGenerate);
            generateBtn._hasListener = true;
        }
        // 触发一次模型预设，以应用正确的尺寸提示
        modelPreset.dispatchEvent(new Event('change'));
    });

})();
</script>
